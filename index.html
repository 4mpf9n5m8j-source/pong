<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PONG ULTRA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#000;height:100%;overflow:hidden;touch-action:none;user-select:none}
body{display:flex;align-items:center;justify-content:center}

#cabinet{
  position:relative;width:100vw;max-width:480px;height:100vh;
  display:flex;flex-direction:column;align-items:center;
  background:#000;overflow:hidden;
}
#cabinet::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:100;
  background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,.14) 3px,rgba(0,0,0,.14) 4px);
}
#cabinet::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:101;
  background:radial-gradient(ellipse at center,transparent 48%,rgba(0,0,0,.8) 100%);
}

/* ── MENU ── */
#menu{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center}
.logo{font-family:'Press Start 2P',monospace;font-size:54px;color:#00ff41;letter-spacing:12px;margin-bottom:4px;text-shadow:0 0 10px #00ff41,0 0 40px #00ff41,0 0 80px rgba(0,255,65,.4)}
.logo-sub{font-family:'Press Start 2P',monospace;font-size:7px;color:#007a1f;letter-spacing:4px;margin-bottom:32px}
.coin{font-family:'Press Start 2P',monospace;font-size:9px;color:#ffb800;animation:blink 1s step-end infinite;margin-bottom:28px}
@keyframes blink{50%{opacity:0}}
.speed-lbl{font-family:'Press Start 2P',monospace;font-size:7px;color:#007a1f;letter-spacing:3px;margin-bottom:10px}
.speed-grid{display:flex;gap:5px;margin-bottom:28px}
.spd{width:31px;height:31px;background:#001a06;border:2px solid #007a1f;color:#007a1f;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.spd.active{background:#00ff41;border-color:#00ff41;color:#000;box-shadow:0 0 10px #00ff41}
#play-btn{font-family:'Press Start 2P',monospace;font-size:11px;color:#000;background:#00ff41;border:none;padding:14px 32px;cursor:pointer;letter-spacing:2px;box-shadow:0 0 20px #00ff41;margin-bottom:32px}
.hint-row{display:flex;gap:36px}
.hint-box{text-align:center}
.hint-box .hl{font-family:'Press Start 2P',monospace;font-size:6px;color:#007a1f;margin-bottom:6px}
.hint-box .hv{font-family:'Press Start 2P',monospace;font-size:7px;color:#00ff41;line-height:1.9}

/* ── GAME ── */
#game{position:absolute;inset:0;display:none;flex-direction:column;z-index:10}
.hud{height:66px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0;position:relative}
.hud-top{border-bottom:1px solid #001a06;transform:rotate(180deg)}
.hud-bottom{border-top:1px solid #001a06}
.hud-name{font-family:'Press Start 2P',monospace;font-size:6px;color:#007a1f;width:28px}
.hud-score{font-family:'Press Start 2P',monospace;font-size:24px;color:#00ff41;text-shadow:0 0 10px #00ff41;min-width:44px;text-align:center}

/* buff display */
.hud-buff{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  min-width:100px;
}
.buff-icon{font-size:18px;line-height:1}
.buff-name{font-family:'Press Start 2P',monospace;font-size:5px;letter-spacing:1px;text-align:center}
.buff-bar-wrap{width:80px;height:4px;background:#111;border:1px solid #222}
.buff-bar{height:100%;transition:width .1s linear}

#pause-btn{font-family:'Press Start 2P',monospace;font-size:7px;color:#007a1f;background:none;border:1px solid #001a06;padding:5px 8px;cursor:pointer}
#canvas{flex:1;display:block;width:100%}

/* ── BUFF ANNOUNCE ── */
#buff-announce{
  position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);
  display:none;flex-direction:column;align-items:center;gap:6px;z-index:200;pointer-events:none;
}
.ba-icon{font-size:44px;animation:popIn .25s cubic-bezier(.2,1.6,.4,1) both}
.ba-name{font-family:'Press Start 2P',monospace;font-size:10px;letter-spacing:2px}
.ba-desc{font-family:'Press Start 2P',monospace;font-size:6px;color:#aaa;letter-spacing:1px;text-align:center;max-width:260px}
@keyframes popIn{from{transform:scale(.2);opacity:0}to{transform:scale(1);opacity:1}}

/* ── ACHIEV ── */
#achiev-popup{
  position:absolute;left:50%;transform:translateX(-50%);
  background:#000;border:2px solid #ffb800;padding:8px 16px;
  z-index:210;pointer-events:none;display:none;
  flex-direction:column;align-items:center;gap:4px;box-shadow:0 0 20px #ffb800;
  white-space:nowrap;
}
#achiev-popup .at{font-family:'Press Start 2P',monospace;font-size:5px;color:#ffb800;letter-spacing:2px}
#achiev-popup .an{font-family:'Press Start 2P',monospace;font-size:9px;color:#fff}

/* ── SCREEN FLASH ── */
#flash{position:absolute;inset:0;pointer-events:none;z-index:150;opacity:0}

/* ── PAUSE ── */
#pause-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.87);align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:18px}
.ptxt{font-family:'Press Start 2P',monospace;font-size:22px;color:#ffb800;text-shadow:0 0 14px #ffb800;animation:blink 1.2s step-end infinite}
.psub{font-family:'Press Start 2P',monospace;font-size:8px;color:#007a1f}

/* ── WIN ── */
#win-screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:#000}
.win-lbl{font-family:'Press Start 2P',monospace;font-size:8px;color:#007a1f;letter-spacing:4px;margin-bottom:14px}
.win-name{font-family:'Press Start 2P',monospace;font-size:30px;color:#00ff41;text-shadow:0 0 20px #00ff41;margin-bottom:8px;text-align:center;line-height:1.4}
.win-sc{font-family:'Press Start 2P',monospace;font-size:12px;color:#ffb800;text-shadow:0 0 8px #ffb800;margin-bottom:36px}
.win-btns{display:flex;flex-direction:column;gap:12px;align-items:center}
.wbtn{font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:2px;padding:13px 26px;cursor:pointer;background:none;border:2px solid #00ff41;color:#00ff41}
.wbtn:active{background:#00ff41;color:#000}
.wbtn.sec{border-color:#003d0f;color:#007a1f}
</style>
</head>
<body>
<div id="cabinet">

  <div id="menu">
    <div class="coin">— INSERT COIN —</div>
    <div class="logo">PONG</div>
    <div class="logo-sub">ULTRA RAGE EDITION</div>
    <div class="speed-lbl">BALL SPEED</div>
    <div class="speed-grid" id="speed-grid"></div>
    <button id="play-btn">▶ START GAME</button>
    <div class="hint-row">
      <div class="hint-box"><div class="hl">PLAYER 1</div><div class="hv">НИЖНЯЯ<br>ЗОНА</div></div>
      <div class="hint-box"><div class="hl">PLAYER 2</div><div class="hv">ВЕРХНЯЯ<br>ЗОНА</div></div>
    </div>
  </div>

  <div id="game">
    <div class="hud hud-top">
      <div class="hud-name">P2</div>
      <div class="hud-score" id="score2">0</div>
      <div class="hud-buff" id="buff-display2">
        <div class="buff-icon" id="buff-icon2"></div>
        <div class="buff-name" id="buff-name2"></div>
        <div class="buff-bar-wrap" id="buff-bar-wrap2" style="display:none">
          <div class="buff-bar" id="buff-bar2"></div>
        </div>
      </div>
    </div>
    <canvas id="canvas"></canvas>
    <div class="hud hud-bottom">
      <div class="hud-name">P1</div>
      <div class="hud-score" id="score1">0</div>
      <div class="hud-buff" id="buff-display1">
        <div class="buff-icon" id="buff-icon1"></div>
        <div class="buff-name" id="buff-name1"></div>
        <div class="buff-bar-wrap" id="buff-bar-wrap1" style="display:none">
          <div class="buff-bar" id="buff-bar1"></div>
        </div>
      </div>
      <button id="pause-btn">II</button>
    </div>
  </div>

  <div id="buff-announce">
    <div class="ba-icon" id="ba-icon"></div>
    <div class="ba-name" id="ba-name"></div>
    <div class="ba-desc" id="ba-desc"></div>
  </div>

  <div id="achiev-popup">
    <div class="at">ACHIEVEMENT</div>
    <div class="an" id="achiev-name"></div>
  </div>

  <div id="flash"></div>

  <div id="pause-overlay">
    <div class="ptxt">PAUSE</div>
    <div class="psub">TAP TO RESUME</div>
  </div>

  <div id="win-screen">
    <div class="win-lbl">WINNER</div>
    <div class="win-name" id="win-player"></div>
    <div class="win-sc" id="win-score"></div>
    <div class="win-btns">
      <button class="wbtn" id="rematch-btn">REMATCH</button>
      <button class="wbtn sec" id="menu-btn">MENU</button>
    </div>
  </div>

</div>
<script>
// ═══════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════
const AC = new (window.AudioContext||window.webkitAudioContext)();
function resumeAC(){ if(AC.state==='suspended') AC.resume(); }

function tone(freq,dur,type='square',vol=0.12,detune=0,attack=0.005,decay=0){
  const o=AC.createOscillator(), g=AC.createGain();
  const dist=AC.createWaveShaper(); // subtle distortion for arcade crunch
  dist.curve=makeDistCurve(20); dist.oversample='2x';
  o.connect(dist); dist.connect(g); g.connect(AC.destination);
  o.type=type; o.frequency.value=freq; o.detune.value=detune;
  g.gain.setValueAtTime(0,AC.currentTime);
  g.gain.linearRampToValueAtTime(vol,AC.currentTime+attack);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur+(decay||0));
  o.start(); o.stop(AC.currentTime+dur+0.05);
}
function makeDistCurve(amt){
  const n=256,c=new Float32Array(n);
  for(let i=0;i<n;i++){const x=i*2/n-1;c[i]=x*(Math.PI+amt)/(Math.PI+amt*Math.abs(x));}
  return c;
}
function noise(dur,vol=0.08){
  const buf=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const src=AC.createBufferSource(), g=AC.createGain();
  src.buffer=buf; src.connect(g); g.connect(AC.destination);
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  src.start();
}

// buffStack: total active buffs count affects sound madness
let buffMadness=0; // 0..6, each buff +1

const SFX={
  paddle(power=1){
    const mad=1+buffMadness*0.4;
    const f=380+power*180*mad;
    tone(f,0.05,'square',0.14*Math.min(mad,2.5));
    if(buffMadness>1) tone(f*1.5,0.04,'sawtooth',0.06*mad,120);
    if(buffMadness>3){ tone(f*2,0.03,'square',0.05,240); noise(0.02,0.05); }
    if(buffMadness>5){ tone(f*0.5,0.08,'sawtooth',0.1,-60); tone(f*3,0.02,'square',0.04,360); }
  },
  wall(){
    const mad=1+buffMadness*0.3;
    tone(180,0.05,'square',0.1*mad);
    if(buffMadness>2) tone(360,0.03,'sawtooth',0.06*mad,80);
  },
  score(){
    tone(200,0.08,'square',0.12); setTimeout(()=>tone(160,0.12,'square',0.1),80);
    if(buffMadness>2){ setTimeout(()=>tone(100,0.15,'sawtooth',0.08),40); }
  },
  powerup(){
    [350,500,750,1050].forEach((f,i)=>setTimeout(()=>tone(f,0.1,'sine',0.16),i*55));
  },
  fire(){
    tone(900,0.04,'sawtooth',0.13); tone(450,0.07,'square',0.1,200);
    noise(0.05,0.07);
    if(buffMadness>3){ tone(1800,0.02,'square',0.05,400); }
  },
  shockwave(){
    tone(600,0.03,'square',0.15); tone(300,0.08,'sawtooth',0.12,100);
    noise(0.04,0.1);
  },
  shield(){
    tone(400,0.04,'sine',0.12); tone(800,0.06,'sine',0.1,-100);
  },
  shieldBreak(){
    tone(200,0.15,'sawtooth',0.18); noise(0.1,0.15);
    setTimeout(()=>tone(100,0.2,'square',0.12),60);
  },
  freeze(){
    [800,600,400,300].forEach((f,i)=>setTimeout(()=>tone(f,0.08,'triangle',0.1),i*40));
  },
  tiny(){
    tone(1200,0.1,'sine',0.1); setTimeout(()=>tone(900,0.08,'sine',0.08),80);
  },
  ghost(){
    tone(300,0.15,'sine',0.08,0,0.08); tone(500,0.12,'sine',0.06,50,0.06);
  },
  magnet(){
    [200,300,400,500,600].forEach((f,i)=>setTimeout(()=>tone(f,0.06,'square',0.08),i*30));
  },
  reverse(){
    tone(150,0.2,'sawtooth',0.15); setTimeout(()=>tone(300,0.15,'square',0.12),100);
    noise(0.08,0.08);
  },
  chaos(){
    for(let i=0;i<6;i++) setTimeout(()=>{ tone(100+Math.random()*1200,0.05,'sawtooth',0.1); },i*40);
    noise(0.1,0.12);
  },
  achiev(){
    [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.14,'sine',0.16),i*80));
  },
  win(){
    [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'sine',0.2),i*110));
  }
};

// ═══════════════════════════════════════════
// BUFF DEFINITIONS
// ═══════════════════════════════════════════
const BUFFS=[
  // FOR SELF
  {id:'wide',     icon:'⬛',  name:'WIDE PADDLE',    desc:'Платформа x1.6',            color:'#00ff41', forSelf:true,  duration:7000},
  {id:'fire',     icon:'🔥',  name:'FIREBALL',        desc:'Мяч сжигает всё на пути',   color:'#ff6600', forSelf:true,  duration:7000},
  {id:'shield',   icon:'🛡',  name:'SHIELD',          desc:'Блокирует один пропуск',    color:'#cc44ff', forSelf:true,  duration:15000},
  {id:'magnet',   icon:'🧲',  name:'MAGNET',          desc:'Мяч тянется к платформе',   color:'#ffb800', forSelf:true,  duration:6000},
  {id:'speedup',  icon:'⚡',  name:'SPEED BOOST',     desc:'Мяч летит быстрее',         color:'#ffee00', forSelf:true,  duration:6000},
  // AGAINST OPPONENT
  {id:'narrow',   icon:'▪',   name:'SHRINK ENEMY',   desc:'Платформа врага x0.45',     color:'#ff2244', forSelf:false, duration:7000},
  {id:'freeze',   icon:'❄️',   name:'FREEZE ENEMY',   desc:'Враг движется медленнее',   color:'#00cfff', forSelf:false, duration:6000},
  {id:'tiny_ball',icon:'🔴',  name:'MICRO BALL',     desc:'Мяч уменьшается',           color:'#ff88cc', forSelf:false, duration:6000},
  {id:'ghost',    icon:'👻',  name:'GHOST BALL',     desc:'Мяч становится полупрозрачным',color:'#aaaaff',forSelf:false,duration:5000},
  {id:'reverse',  icon:'🔄',  name:'REVERSE',        desc:'Управление врага инвертируется',color:'#ff44ff',forSelf:false,duration:5000},
  {id:'chaos',    icon:'💥',  name:'CHAOS MODE',     desc:'Мяч хаотично прыгает',      color:'#ff0044', forSelf:false, duration:4000},
];

// ═══════════════════════════════════════════
// PALETTES
// ═══════════════════════════════════════════
const PALS=[
  {bg:'#000000',mid:'#001a06',ball:'#ffffff',p1:'#00ff41',p2:'#00ff41',trail:'255,255,255'},
  {bg:'#0a0000',mid:'#1a0500',ball:'#ff6600',p1:'#ff8800',p2:'#ff2200',trail:'255,102,0'},
  {bg:'#00000a',mid:'#00051a',ball:'#00cfff',p1:'#0088ff',p2:'#00ffee',trail:'0,207,255'},
  {bg:'#05000a',mid:'#0d0014',ball:'#cc44ff',p1:'#ff44cc',p2:'#8844ff',trail:'204,68,255'},
  {bg:'#0a0800',mid:'#1a1200',ball:'#ffee00',p1:'#ffaa00',p2:'#ffee00',trail:'255,238,0'},
  {bg:'#000a0a',mid:'#001414',ball:'#00ffcc',p1:'#00ffaa',p2:'#00ccff',trail:'0,255,204'},
];
let palIdx=0,palTransition=1,palFrom=PALS[0],palTo=PALS[0],pal={...PALS[0]};
let palTimer=0;

function lerpColor(a,b,t){
  const h=s=>parseInt(s.slice(1,3),16);
  const r=(c,i)=>Math.round(h(a[i])+(h(b[i])-h(a[i]))*t).toString(16).padStart(2,'0');
  return '#'+[1,3,5].map(i=>r(null,i)).join('');
}
function updatePal(){
  palTimer++;
  if(palTimer>540){palTimer=0;palFrom={...pal};palIdx=(palIdx+1)%PALS.length;palTo=PALS[palIdx];palTransition=0;}
  if(palTransition<1) palTransition=Math.min(1,palTransition+0.012);
  const lerp=(k)=>lerpColor(palFrom[k]||'#000000',palTo[k]||'#000000',palTransition);
  pal={bg:lerp('bg'),mid:lerp('mid'),ball:lerp('ball'),p1:lerp('p1'),p2:lerp('p2'),trail:palTo.trail};
}

// ═══════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════
let P=[];
function spark(x,y,color,n=12,spd=4,life=28,gravity=.15){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=(.4+Math.random())*spd;
    P.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,ml:life,color,r:1.5+Math.random()*3,g:gravity});
  }
}
function firePuff(x,y,n=22){
  const cols=['#ff4400','#ff8800','#ffee00','#ff2200','#fff'];
  for(let i=0;i<n;i++){
    const a=-Math.PI/2+(Math.random()-.5)*Math.PI*.9,s=2+Math.random()*6;
    P.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:18+Math.random()*16,ml:34,color:cols[i%cols.length],r:2+Math.random()*4,g:.12});
  }
}
function icePuff(x,y,n=16){
  const cols=['#00cfff','#aaeeff','#ffffff','#0088ff'];
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*4;
    P.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:22+Math.random()*14,ml:36,color:cols[i%cols.length],r:2+Math.random()*3,g:.05});
  }
}
function shieldBurst(x,y){
  for(let i=0;i<28;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*6;
    P.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30,ml:30,color:'#cc44ff',r:3+Math.random()*3,g:.08});
  }
  spark(x,y,'#ffffff',10,3,20);
}
function chaosBurst(x,y){
  const cols=['#ff0044','#ff8800','#ffee00','#00ff41','#00cfff','#cc44ff'];
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*8;
    P.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:25+Math.random()*20,ml:45,color:cols[i%cols.length],r:2+Math.random()*5,g:.1});
  }
}
function ringBurst(x,y,color,r=30,n=24){
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    P.push({x:x+Math.cos(a)*r,y:y+Math.sin(a)*r,vx:Math.cos(a)*3,vy:Math.sin(a)*3,life:20,ml:20,color,r:2,g:0});
  }
}
function updateP(){
  P=P.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.life--;return p.life>0;});
}
function drawP(){
  for(const p of P){
    const a=p.life/p.ml;
    ctx.globalAlpha=a;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*(.5+a*.5),0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════
// POWERUP ITEMS
// ═══════════════════════════════════════════
let powerups=[],puTimer=0;
function spawnPU(){
  const W=canvas.width,H=canvas.height;
  const b=BUFFS[Math.floor(Math.random()*BUFFS.length)];
  powerups.push({x:W*.12+Math.random()*W*.76,y:H*.22+Math.random()*H*.56,buff:b,life:380,ml:380,pulse:0});
}

// ═══════════════════════════════════════════
// ACHIEVEMENTS
// ═══════════════════════════════════════════
const ACHIEVS=[
  {id:'first',   label:'⚡ FIRST BLOOD',   check:g=>g.p1.score+g.p2.score===1},
  {id:'hat',     label:'🎩 HAT TRICK',     check:g=>g.streak>=3},
  {id:'five',    label:'💀 FIVE IN A ROW', check:g=>g.streak>=5},
  {id:'comeback',label:'🔥 COMEBACK',      check:g=>g.comeback},
  {id:'shielded',label:'🛡 SAVED!',        check:g=>g.shieldSaved},
  {id:'chaos',   label:'💥 CHAOS!',        check:g=>g.chaosHits>=3},
  {id:'speedmax',label:'⚡ FULL SPEED',    check:g=>g.ball.spd>ballSpd()*2.1},
];
const unlocked=new Set();
function checkAchievs(){
  for(const a of ACHIEVS) if(!unlocked.has(a.id)&&a.check(g)){unlocked.add(a.id);showAchiev(a.label);}
}
let achievTimer=null;

}

// ═══════════════════════════════════════════
// SHAKE
// ═══════════════════════════════════════════
let shakeAmt=0;
function shake(a=6){shakeAmt=Math.max(shakeAmt,a);}
function applyShake(){
  if(shakeAmt>0.2){
    const dx=(Math.random()-.5)*shakeAmt*2,dy=(Math.random()-.5)*shakeAmt*2;
    canvas.style.transform=`translate(${dx}px,${dy}px)`;
    shakeAmt*=.7;
  } else { canvas.style.transform='none'; shakeAmt=0; }
}

let trail=[];

// ═══════════════════════════════════════════
// GAME METRICS
// ═══════════════════════════════════════════
const WIN_SCORE=20;
let gameSpeed=5;

function ballSpd(){
  const h=canvas.height||700;
  return (7+(gameSpeed-1)*2.5)*(h/700);
}
function phw(who){
  if(!g) return canvas.width*.19;
  const base=canvas.width*.19;
  const p=g[who], opp=who==='p1'?'p2':'p1';
  let w=base;
  if(p.buff==='wide') w*=1.6;
  if(g[opp].buff==='narrow') w*=0.45;
  return w;
}
function paddleH(){ return Math.max(10,canvas.height*.022); }
function paddleY(who){ return who==='p1'?canvas.height*.9:canvas.height*.1; }
function bRadius(){
  if(!g) return canvas.width*.018;
  let r=canvas.width*.018;
  if(g.p1.buff==='tiny_ball'||g.p2.buff==='tiny_ball') r*=.45;
  return r;
}

let baTimer=null;
function announceBuff(buff,who){
  baIcon.textContent=buff.icon;
  const forStr=buff.forSelf?(who==='p1'?'P1':'P2')+(': '):(who==='p1'?'P2':'P1')+(' ☠ ');

// ═══════════════════════════════════════════
// APPLY BUFF
// ═══════════════════════════════════════════
function applyBuff(collector,buff){
  // who is affected
  const target=buff.forSelf?collector:(collector==='p1'?'p2':'p1');
  const p=g[target];
  p.buff=buff.id;
  p.buffEnd=Date.now()+buff.duration;
  if(buff.id==='shield') p.shield=true;
  updateBuffHUD(target);
  announceBuff(buff,collector);
  buffMadness=countActivBuffs();
  // sfx
  const sfxMap={fire:SFX.fire,freeze:SFX.freeze,shield:SFX.shield,tiny_ball:SFX.tiny,ghost:SFX.ghost,magnet:SFX.magnet,reverse:SFX.reverse,chaos:SFX.chaos};
  (sfxMap[buff.id]||SFX.powerup)();
}

function countActivBuffs(){
  let c=0;
  if(g.p1.buff) c++;
  if(g.p2.buff) c++;
  return c;
}

function updateBuffHUD(who){
  if(!g) return;
  const p=g[who],els=getBuffEls(who);
  if(p.buff){
    const bf=BUFFS.find(b=>b.id===p.buff);
    els.icon.textContent=bf?bf.icon:'';
    els.name.textContent=bf?bf.name:'';
    els.name.style.color=bf?bf.color:'#fff';
    els.barWrap.style.display='block';
    els.bar.style.background=bf?bf.color:'#fff';
  } else {
    els.icon.textContent='';els.name.textContent='';
    els.barWrap.style.display='none';
  }
}

function updateBuffBars(){
  const now=Date.now();
  for(const who of['p1','p2']){
    const p=g[who],els=getBuffEls(who);
    if(p.buff){
      const bf=BUFFS.find(b=>b.id===p.buff);
      const pct=Math.max(0,(p.buffEnd-now)/(bf?bf.duration:7000))*100;
      els.bar.style.width=pct+'%';
    }
  }
}

// START
// ═══════════════════════════════════════════
function startGame(){
  gameEl.style.display='flex';menuEl.style.display='none';
  winEl.style.display='none';pauseEl.style.display='none';
  unlocked.clear();
  setTimeout(()=>{
    resizeCanvas();
    const W=canvas.width,H=canvas.height;
    const spd=ballSpd();
    const ang=Math.random()*Math.PI/4+Math.PI/8;
    const xd=Math.random()<.5?1:-1,yd=Math.random()<.5?1:-1;
    P=[];trail=[];powerups=[];puTimer=0;
    palIdx=0;pal={...PALS[0]};palFrom=pal;palTo=pal;palTransition=1;palTimer=0;
    buffMadness=0;
    g={
      p1:{cx:W/2,score:0,buff:null,buffEnd:0,shield:false},
      p2:{cx:W/2,score:0,buff:null,buffEnd:0,shield:false},
      ball:{x:W/2,y:H/2,vx:Math.cos(ang)*spd*xd,vy:Math.sin(ang)*spd*yd,spd},
      streak:0,lastScorer:null,comeback:false,shieldSaved:false,chaosHits:0,
    };
    score1El.textContent='0';score2El.textContent='0';
    updateBuffHUD('p1');updateBuffHUD('p2');
    touch.p1=null;touch.p2=null;
    appState='game';
    cancelAnimationFrame(animId);
    loop();
  },60);
}

// ═══════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════
function applyKeys(){
  if(!g||appState!=='game') return;
  const W=canvas.width;
  const spd=(W/100)*(2+gameSpeed*.3);
  if(keys['a']||keys['A']) g.p1.cx=Math.max(phw('p1'),g.p1.cx-spd);
  if(keys['d']||keys['D']) g.p1.cx=Math.min(W-phw('p1'),g.p1.cx+spd);
  // p2 reverse check
  const p2rev=g.p2.buff==='reverse';
  if(keys['ArrowLeft'])  g.p2.cx=Math.max(phw('p2'),g.p2.cx-(p2rev?-spd:spd));
  if(keys['ArrowRight']) g.p2.cx=Math.min(W-phw('p2'),g.p2.cx+(p2rev?-spd:spd));
}

function update(){
  if(!g) return;
  const now=Date.now();
  const W=canvas.width,H=canvas.height;
  const b=g.ball;

  updatePal();

  // expire buffs
  for(const who of['p1','p2']){
    const p=g[who];
    if(p.buff&&now>p.buffEnd){
      if(p.buff==='shield') p.shield=false;
      p.buff=null;
      updateBuffHUD(who);
      buffMadness=countActivBuffs();
    }
  }
  updateBuffBars();

  // chaos effect: random velocity twitch
  if(g.p1.buff==='chaos'||g.p2.buff==='chaos'){
    if(Math.random()<.04){
      b.vx+=(Math.random()-.5)*b.spd*.5;
      b.vy+=(Math.random()-.5)*b.spd*.3;
      const mag=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
      b.vx=b.vx/mag*b.spd; b.vy=b.vy/mag*b.spd;
      g.chaosHits++;
      if(Math.random()<.3){ chaosBurst(b.x,b.y); SFX.chaos(); }
    }
  }

  // magnet: pull ball toward paddle center
  if(g.p1.buff==='magnet'&&b.vy>0){
    b.vx+=(g.p1.cx-b.x)*0.003;
  }
  if(g.p2.buff==='magnet'&&b.vy<0){
    b.vx+=(g.p2.cx-b.x)*0.003;
  }

  // speed modifier
  let spdMod=1;
  if(g.p1.buff==='speedup'||g.p2.buff==='speedup') spdMod=1.5;

  // powerup spawn
  puTimer++;
  if(puTimer>280&&powerups.length<3){puTimer=0;spawnPU();}

  // trail
  trail.push({x:b.x,y:b.y,life:16});
  if(trail.length>22) trail.shift();
  trail.forEach(t=>t.life--);

  b.x+=b.vx*spdMod;
  b.y+=b.vy*spdMod;

  // walls
  const br=bRadius();
  if(b.x-br<=0){b.x=br;b.vx=Math.abs(b.vx);SFX.wall();spark(b.x,b.y,pal.ball,6,3);}
  if(b.x+br>=W){b.x=W-br;b.vx=-Math.abs(b.vx);SFX.wall();spark(b.x,b.y,pal.ball,6,3);}

  hitPaddle('p1'); hitPaddle('p2');

  // powerup collection
  powerups=powerups.filter(pu=>{
    pu.life--;pu.pulse++;
    const dist=Math.hypot(b.x-pu.x,b.y-pu.y);
    if(dist<br+20){
      const who=b.vy>0?'p1':'p2';
      applyBuff(who,pu.buff);
      spark(pu.x,pu.y,pu.buff.color,20,6,40);
      ringBurst(pu.x,pu.y,pu.buff.color,20);
      return false;
    }
    return pu.life>0;
  });

  // goals
  if(b.y<-br*6) scorePoint('p1',b.x,0);
  if(b.y>H+br*6) scorePoint('p2',b.x,H);

  updateP();
  updateFlash();
  applyShake();
  checkAchievs();
}

function hitPaddle(who){
  const b=g.ball,p=g[who];
  const cy=paddleY(who),pw=phw(who),ph=paddleH(),br=bRadius();
  const toward=who==='p1'?b.vy>0:b.vy<0;
  if(!toward) return;
  const dist=who==='p1'?(b.y+br)-(cy-ph/2):(cy+ph/2)-(b.y-br);
  if(dist>0&&dist<ph+Math.abs(b.vy)*2.5){
    if(b.x>=p.cx-pw&&b.x<=p.cx+pw){
      if(who==='p1') b.y=cy-ph/2-br; else b.y=cy+ph/2+br;
      b.vy=-b.vy;
      const rel=(b.x-p.cx)/pw;
      const oldSpd=b.spd;
      b.spd=Math.min(b.spd*1.03,ballSpd()*2.6);
      b.vx=rel*b.spd*.9;
      const mag=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
      b.vx=b.vx/mag*b.spd; b.vy=b.vy/mag*b.spd;

      const isFire=p.buff==='fire';
      if(isFire){
        firePuff(b.x,b.y);
        SFX.fire();
        flash('#ff4400',.3);shake(5);
        ringBurst(b.x,b.y,'#ff6600',14);
      } else {
        spark(b.x,b.y,who==='p1'?pal.p1:pal.p2,10,4);
        SFX.paddle(b.spd/Math.max(oldSpd,1));
        if(b.spd>ballSpd()*1.8){flash(pal.ball,.15);shake(3);}
      }
    }
  }
}

function scorePoint(who,bx,by){
  const opp=who==='p1'?'p2':'p1';
  // shield
  if(g[opp].shield){
    g[opp].shield=false;g[opp].buff=null;
    updateBuffHUD(opp);g.shieldSaved=true;
    shieldBurst(bx,by);SFX.shieldBreak();
    flash('#cc44ff',.5);shake(8);
    resetBall(who==='p1'?-1:1);
    return;
  }
  g[who].score++;
  (who==='p1'?score1El:score2El).textContent=g[who].score;
  SFX.score();
  spark(bx,by,pal.ball,30,7,55);
  ringBurst(bx,by,pal.ball,40);
  flash('#ffffff',.5);shake(10);
  cyclePal();
  if(g.lastScorer===who) g.streak++; else{g.lastScorer=who;g.streak=1;}
  if(g[opp].score-g[who].score>=4&&g[who].score>0) g.comeback=true;
  if(g[who].score>=WIN_SCORE){showWin('PLAYER '+(who==='p1'?'1':'2'),g.p1.score,g.p2.score);return;}
  resetBall(who==='p1'?-1:1);
}

function cyclePal(){
  palFrom={...pal};palIdx=(palIdx+1)%PALS.length;palTo=PALS[palIdx];palTransition=0;palTimer=0;
}

function resetBall(yd){
  const W=canvas.width,H=canvas.height,spd=ballSpd();
  const ang=Math.random()*Math.PI/4+Math.PI/8,xd=Math.random()<.5?1:-1;
  g.ball={x:W/2,y:H/2,vx:Math.cos(ang)*spd*xd,vy:Math.sin(ang)*spd*yd,spd};
  trail=[];
}

// ═══════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════
function draw(){
  if(!canvas.width||!canvas.height) return;
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=pal.bg;ctx.fillRect(0,0,W,H);

  // center dashes
  ctx.setLineDash([5,9]);ctx.strokeStyle=pal.mid;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
  ctx.setLineDash([]);

  if(!g) return;

  // powerups
  for(const pu of powerups){
    const a=Math.min(1,pu.life/60);
    const scale=1+Math.sin(pu.pulse*.12)*.18;
    const r=15*scale;
    ctx.globalAlpha=a;
    ctx.shadowColor=pu.buff.color;ctx.shadowBlur=18;
    ctx.fillStyle=pu.buff.color+'44';
    ctx.beginPath();ctx.arc(pu.x,pu.y,r+8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=pu.buff.color;
    ctx.beginPath();ctx.arc(pu.x,pu.y,r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // icon
    ctx.font=`${14*scale}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#000';
    ctx.fillText(pu.buff.icon,pu.x,pu.y);
    // name below
    ctx.font='5px "Press Start 2P", monospace';
    ctx.fillStyle=pu.buff.color;
    ctx.fillText(pu.buff.name,pu.x,pu.y+r+10);
    ctx.globalAlpha=1;
  }

  // trail
  const isFire=g&&(g.p1.buff==='fire'||g.p2.buff==='fire');
  const trailRgb=isFire?'255,102,0':pal.trail;
  for(let i=0;i<trail.length;i++){
    const t=trail[i];
    const frac=i/trail.length;
    const a=frac*0.55*(t.life/16);
    ctx.globalAlpha=a;
    ctx.fillStyle=`rgba(${trailRgb},${a})`;
    const r=bRadius()*frac*.85;
    ctx.beginPath();ctx.arc(t.x,t.y,r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // particles
  drawP();

  // paddles
  drawPaddle('p1');drawPaddle('p2');

  // ball
  drawBall();
}

function drawPaddle(who){
  const p=g[who],cy=paddleY(who),pw=phw(who),ph=paddleH();
  const c=who==='p1'?pal.p1:pal.p2;
  const isShield=p.buff==='shield';
  const isFrozen=(who==='p1'&&g.p2.buff==='freeze')||(who==='p2'&&g.p1.buff==='freeze');
  const isReversed=p.buff==='reverse';
  const color=isFrozen?'#00cfff':isReversed?'#ff44ff':c;

  if(isShield){ctx.shadowColor='#cc44ff';ctx.shadowBlur=24;}
  if(isFrozen){ctx.shadowColor='#00cfff';ctx.shadowBlur=16;}

  ctx.fillStyle=color;
  ctx.fillRect(p.cx-pw,cy-ph/2,pw*2,ph);

  // indicators on paddle
  if(p.buff==='fire'){
    if(Math.random()<.5) firePuff(p.cx+(Math.random()-.5)*pw*1.2,cy-ph/2-2,5);
  }
  if(isReversed){
    ctx.fillStyle='#ff44ff44';
    ctx.fillRect(p.cx-pw,cy-ph/2,pw*2,ph);
  }
  ctx.shadowBlur=0;

  // buff indicator line on top/bottom of paddle
  if(p.buff){
    const bf=BUFFS.find(b=>b.id===p.buff);
    if(bf){
      const pct=Math.max(0,(p.buffEnd-Date.now())/bf.duration);
      ctx.fillStyle=bf.color;
      ctx.fillRect(p.cx-pw,cy-(who==='p1'?ph/2+3:-(ph/2+3)),pw*2*pct,2);
    }
  }
}

function drawBall(){
  const b=g.ball,br=bRadius();
  const isFire=g.p1.buff==='fire'||g.p2.buff==='fire';
  const isGhost=g.p1.buff==='ghost'||g.p2.buff==='ghost';
  const isTiny=g.p1.buff==='tiny_ball'||g.p2.buff==='tiny_ball';
  const bc=isFire?'#ff6600':pal.ball;

  ctx.globalAlpha=isGhost?.3:1;

  // outer glow
  const gr=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,br*5);
  gr.addColorStop(0,bc+'88');gr.addColorStop(.5,bc+'22');gr.addColorStop(1,bc+'00');
  ctx.fillStyle=gr;
  ctx.beginPath();ctx.arc(b.x,b.y,br*5,0,Math.PI*2);ctx.fill();

  ctx.shadowColor=bc;ctx.shadowBlur=isFire?24:12;
  ctx.fillStyle=isFire?'#ffcc00':'#fff';
  ctx.beginPath();ctx.arc(b.x,b.y,br,0,Math.PI*2);ctx.fill();

  // tiny twinkle
  if(isTiny){
    ctx.fillStyle='#ff88cc';ctx.shadowBlur=8;
    for(let i=0;i<3;i++){
      const a=(Date.now()/200+i*2.1)%(Math.PI*2);
      ctx.beginPath();ctx.arc(b.x+Math.cos(a)*br*2.5,b.y+Math.sin(a)*br*2.5,br*.4,0,Math.PI*2);ctx.fill();
    }
  }

  ctx.shadowBlur=0;ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════
function loop(){
  applyKeys();
  if(appState==='game') update();
  draw();
  animId=requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════
// TOUCH
// ═══════════════════════════════════════════
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();resumeAC();
  if(appState==='paused'){togglePause();return;}
  if(appState!=='game') return;
  const rect=canvas.getBoundingClientRect();
  for(const t of e.changedTouches){
    const ty=t.clientY-rect.top,tx=t.clientX-rect.left;
    const isBot=ty>canvas.height/2;
    if(isBot&&!touch.p1) touch.p1={id:t.identifier};
    else if(!isBot&&!touch.p2) touch.p2={id:t.identifier};
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(appState!=='game'||!g) return;
  const rect=canvas.getBoundingClientRect();
  const W=canvas.width;
  for(const t of e.changedTouches){
    const tx=t.clientX-rect.left;
    const isP1Rev=g.p1.buff==='reverse';
    const isP2Rev=g.p2.buff==='reverse';
    if(touch.p1&&t.identifier===touch.p1.id){
      const cx=isP1Rev?W-tx:tx;
      g.p1.cx=Math.max(phw('p1'),Math.min(W-phw('p1'),cx));
    }
    if(touch.p2&&t.identifier===touch.p2.id){
      const cx=isP2Rev?W-tx:tx;
      g.p2.cx=Math.max(phw('p2'),Math.min(W-phw('p2'),cx));
    }
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){
    if(touch.p1&&t.identifier===touch.p1.id) touch.p1=null;
    if(touch.p2&&t.identifier===touch.p2.id) touch.p2=null;
  }
},{passive:false});

// ═══════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.code==='Space'){togglePause();e.preventDefault();}
  if(['ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// ═══════════════════════════════════════════
// GO
// ═══════════════════════════════════════════
showMenu();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PONG ULTRA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#000;height:100%;overflow:hidden;touch-action:none;user-select:none}
body{display:flex;align-items:center;justify-content:center}
#cab{position:relative;width:100vw;max-width:480px;height:100vh;display:flex;flex-direction:column;align-items:center;background:#000;overflow:hidden}
#sl{position:absolute;inset:0;pointer-events:none;z-index:50;background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,rgba(0,0,0,.13) 3px,rgba(0,0,0,.13) 4px)}
#vg{position:absolute;inset:0;pointer-events:none;z-index:50;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.65) 100%)}

/* MENU */
#menu{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center}
.coin{font-family:'Press Start 2P',monospace;font-size:9px;color:#ffb800;animation:bl 1s step-end infinite;margin-bottom:20px}
@keyframes bl{50%{opacity:0}}
.logo{font-family:'Press Start 2P',monospace;font-size:46px;color:#00ff41;letter-spacing:10px;text-shadow:0 0 10px #00ff41,0 0 40px #00ff41;margin-bottom:4px}
.sub{font-family:'Press Start 2P',monospace;font-size:7px;color:#007a1f;letter-spacing:4px;margin-bottom:24px}
.mlbl{font-family:'Press Start 2P',monospace;font-size:7px;color:#007a1f;letter-spacing:3px;margin-bottom:9px}
.sgrid{display:flex;gap:5px;margin-bottom:20px}
.sbtn{width:29px;height:29px;background:#001a06;border:2px solid #007a1f;color:#007a1f;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sbtn.on{background:#00ff41;border-color:#00ff41;color:#000;box-shadow:0 0 10px #00ff41}
.mbtn{padding:9px 14px;background:#001a06;border:2px solid #007a1f;color:#007a1f;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;letter-spacing:1px}
.mbtn.on{background:#00cfff;border-color:#00cfff;color:#000;box-shadow:0 0 10px #00cfff}
.dbtn{padding:7px 10px;background:#001a06;border:2px solid #007a1f;color:#007a1f;font-family:'Press Start 2P',monospace;font-size:7px;cursor:pointer}
.dbtn.on{background:#ffb800;border-color:#ffb800;color:#000;box-shadow:0 0 8px #ffb800}
/* WIN TARGET SELECTOR */
.wgrid{display:flex;gap:8px;margin-bottom:22px}
.wbtn2{padding:8px 12px;background:#001a06;border:2px solid #007a1f;color:#007a1f;font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer}
.wbtn2.on{background:#ffb800;border-color:#ffb800;color:#000;box-shadow:0 0 10px #ffb800}
#pb{font-family:'Press Start 2P',monospace;font-size:11px;color:#000;background:#00ff41;border:none;padding:13px 28px;cursor:pointer;letter-spacing:2px;box-shadow:0 0 20px #00ff41;margin-bottom:24px}
.hr{display:flex;gap:36px}
.hb .hl{font-family:'Press Start 2P',monospace;font-size:6px;color:#007a1f;margin-bottom:6px;text-align:center}
.hb .hv{font-family:'Press Start 2P',monospace;font-size:7px;color:#00ff41;line-height:1.9;text-align:center}

/* GAME */
#game{position:absolute;inset:0;z-index:10;display:none;flex-direction:column}
.hud{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;flex-shrink:0}
.ht{border-bottom:1px solid #001a06;transform:rotate(180deg)}
.hb2{border-top:1px solid #001a06}
.hn{font-family:'Press Start 2P',monospace;font-size:6px;color:#007a1f;width:22px}
.hs{font-family:'Press Start 2P',monospace;font-size:22px;color:#00ff41;text-shadow:0 0 8px #00ff41;min-width:40px;text-align:center}
/* BUFF SLOT */
.bslot{display:flex;flex-direction:column;align-items:center;min-width:96px;gap:1px}
.bslot .bi{font-size:18px;line-height:1;min-height:22px;display:flex;align-items:center;justify-content:center}
.bslot .bn{font-family:'Press Start 2P',monospace;font-size:5px;min-height:8px;letter-spacing:0}
/* CIRCULAR TIMER */
.bslot .ctimer{position:relative;width:32px;height:32px;margin-top:1px}
.bslot .ctimer canvas{position:absolute;top:0;left:0}
.bslot .ctimer .cnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:6px;color:#fff}
#ppb{font-family:'Press Start 2P',monospace;font-size:7px;color:#007a1f;background:none;border:1px solid #001a06;padding:5px 8px;cursor:pointer}
#cv{flex:1;display:block;width:100%}

/* BUFF ANNOUNCE */
#ba{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);display:none;flex-direction:column;align-items:center;gap:5px;z-index:30;pointer-events:none}
#ba .bai{font-size:52px;line-height:1}
#ba .ban{font-family:'Press Start 2P',monospace;font-size:11px;letter-spacing:2px}
#ba .bad{font-family:'Press Start 2P',monospace;font-size:6px;color:#ccc;text-align:center;padding:0 20px}

/* SURVIVAL SCORE */
#surv-score{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);display:none;flex-direction:column;align-items:center;pointer-events:none;z-index:20}
#surv-score .ss-pts{font-family:'Press Start 2P',monospace;font-size:36px;color:#00ff41;text-shadow:0 0 16px #00ff41;line-height:1}
#surv-score .ss-best{font-family:'Press Start 2P',monospace;font-size:8px;color:#007a1f;margin-top:6px;letter-spacing:2px}
#surv-score .ss-mult{font-family:'Press Start 2P',monospace;font-size:11px;color:#ffb800;text-shadow:0 0 8px #ffb800;margin-top:4px}
/* SCORE POP */
.spop{position:absolute;font-family:'Press Start 2P',monospace;font-size:28px;pointer-events:none;z-index:35;animation:spopA .7s ease-out forwards}
@keyframes spopA{0%{opacity:1;transform:translateY(0) scale(1.4)}100%{opacity:0;transform:translateY(-60px) scale(0.8)}}

/* ACHIEV */
#ach{position:absolute;left:50%;transform:translateX(-50%);background:#000;border:2px solid #ffb800;padding:8px 14px;z-index:40;pointer-events:none;display:none;flex-direction:column;align-items:center;gap:3px;box-shadow:0 0 20px #ffb800;white-space:nowrap}
#ach .at{font-family:'Press Start 2P',monospace;font-size:5px;color:#ffb800;letter-spacing:2px}
#ach .an{font-family:'Press Start 2P',monospace;font-size:9px;color:#fff}

#fl{position:absolute;inset:0;pointer-events:none;z-index:45;opacity:0}
#po{display:none;position:absolute;inset:0;background:rgba(0,0,0,.88);align-items:center;justify-content:center;z-index:60;flex-direction:column;gap:18px}
#po .pt{font-family:'Press Start 2P',monospace;font-size:22px;color:#ffb800;text-shadow:0 0 14px #ffb800;animation:bl 1.2s step-end infinite}
#po .ps{font-family:'Press Start 2P',monospace;font-size:8px;color:#007a1f}
#ws{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:#000}
#ws .wl{font-family:'Press Start 2P',monospace;font-size:8px;color:#007a1f;letter-spacing:4px;margin-bottom:14px}
#ws .wn{font-family:'Press Start 2P',monospace;font-size:28px;color:#00ff41;text-shadow:0 0 20px #00ff41;margin-bottom:8px;text-align:center}
#ws .wsc{font-family:'Press Start 2P',monospace;font-size:12px;color:#ffb800;text-shadow:0 0 8px #ffb800;margin-bottom:36px}
.wb{display:flex;flex-direction:column;gap:12px;align-items:center}
.wbt{font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:2px;padding:13px 26px;cursor:pointer;background:none;border:2px solid #00ff41;color:#00ff41}
.wbt.s{border-color:#003d0f;color:#007a1f}
</style>
</head>
<body>
<div id="cab">
  <div id="sl"></div><div id="vg"></div>

  <div id="menu">
    <div class="coin">— INSERT COIN —</div>
    <div class="logo">PONG</div>
    <div class="sub">ULTRA RAGE EDITION</div>
    <div class="mlbl">BALL SPEED</div>
    <div class="sgrid" id="sg"></div>
    <div class="mlbl">ПОБЕДА ДО</div>
    <div class="wgrid" id="wg"></div>
    <div class="mlbl">РЕЖИМ</div>
    <div class="sgrid" style="margin-bottom:18px" id="mg"></div>
    <div id="diff-row" style="display:none;flex-direction:column;align-items:center;gap:8px;margin-bottom:18px">
      <div class="mlbl">СЛОЖНОСТЬ AI</div>
      <div class="sgrid" id="dg"></div>
    </div>
    <button id="pb">▶ START GAME</button>
    <div class="hr" id="ctrl-hint">
      <div class="hb"><div class="hl">PLAYER 1</div><div class="hv">НИЖНЯЯ<br>ЗОНА</div></div>
      <div class="hb"><div class="hl">PLAYER 2</div><div class="hv">ВЕРХНЯЯ<br>ЗОНА</div></div>
    </div>
  </div>

  <div id="game">
    <div class="hud ht">
      <div class="hn">P2</div>
      <div class="hs" id="s2">0</div>
      <div class="bslot" id="bs2">
        <div class="bi" id="bi2"></div>
        <div class="bn" id="bn2"></div>
        <div class="ctimer" id="ct2" style="display:none">
          <canvas id="ctc2" width="32" height="32"></canvas>
          <div class="cnum" id="ctn2"></div>
        </div>
      </div>
    </div>
    <canvas id="cv"></canvas>
    <div class="hud hb2">
      <div class="hn">P1</div>
      <div class="hs" id="s1">0</div>
      <div class="bslot" id="bs1">
        <div class="bi" id="bi1"></div>
        <div class="bn" id="bn1"></div>
        <div class="ctimer" id="ct1" style="display:none">
          <canvas id="ctc1" width="32" height="32"></canvas>
          <div class="cnum" id="ctn1"></div>
        </div>
      </div>
      <button id="ppb">II</button>
    </div>
  </div>

  <div id="surv-score">
    <div class="ss-pts" id="ss-pts">0</div>
    <div class="ss-best" id="ss-best">BEST: 0</div>
    <div class="ss-mult" id="ss-mult"></div>
  </div>
  <div id="ba"><div class="bai" id="bai"></div><div class="ban" id="ban"></div><div class="bad" id="bad"></div></div>
  <div id="ach"><div class="at">ACHIEVEMENT</div><div class="an" id="achn"></div></div>
  <div id="fl"></div>
  <div id="po"><div class="pt">PAUSE</div><div class="ps">TAP TO RESUME</div></div>
  <div id="ws">
    <div class="wl">WINNER</div>
    <div class="wn" id="wn"></div>
    <div class="wsc" id="wsc"></div>
    <div class="wb"><button class="wbt" id="rb">REMATCH</button><button class="wbt s" id="mb">MENU</button></div>
  </div>
</div>

<script>
// ═══ VIBRATION ═══════════════════════════════════════
function vib(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e) {}
}
var VIB = {
  paddle: function() { vib(12); },
  wall:   function() { vib(8); },
  score:  function() { vib([40,20,40]); },
  powerup:function() { vib([20,10,20,10,30]); },
  shield: function() { vib([10,5,10,5,10]); },
  win:    function() { vib([80,30,80,30,120]); },
  fire:   function() { vib([15,5,15]); },
  big:    function() { vib([60,10,30]); }
};

// ═══ AUDIO ═══════════════════════════════════════════
var AC;
try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
function resumeAC() { if (AC && AC.state === 'suspended') AC.resume(); }

function tone(freq, dur, type, vol, det) {
  if (!AC) return;
  try {
    var o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = type || 'square'; o.frequency.value = freq;
    if (det) o.detune.value = det;
    g.gain.setValueAtTime(vol || 0.12, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.start(); o.stop(AC.currentTime + dur + 0.05);
  } catch(e) {}
}
function nz(dur, vol) {
  if (!AC) return;
  try {
    var len = Math.floor(AC.sampleRate * dur);
    var buf = AC.createBuffer(1, len, AC.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    var src = AC.createBufferSource(), g = AC.createGain();
    src.buffer = buf; src.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(vol || 0.08, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    src.start();
  } catch(e) {}
}

var mad = 0;
var SFX = {
  paddle: function(p) {
    var f = 380 + (p||1)*160 + mad*80;
    tone(f, 0.05, 'square', 0.13); VIB.paddle();
    if (mad > 1) tone(f*1.5, 0.04, 'sawtooth', 0.06, 120);
    if (mad > 3) { tone(f*2, 0.03, 'square', 0.05); nz(0.02, 0.04); }
    if (mad > 5) { tone(f*0.5, 0.07, 'sawtooth', 0.08); tone(f*3, 0.02, 'square', 0.03); }
  },
  wall: function() { tone(180, 0.05, 'square', 0.1 + mad*0.03); VIB.wall(); if (mad > 2) tone(360, 0.03, 'sawtooth', 0.05, 80); },
  score: function() { tone(200,0.08,'square',0.12); setTimeout(function(){tone(160,0.12,'square',0.1);},80); VIB.score(); if(mad>2) setTimeout(function(){tone(100,0.15,'sawtooth',0.07);},40); },
  powerup: function() { var fs=[350,500,750,1050]; for(var i=0;i<4;i++)(function(f,d){setTimeout(function(){tone(f,0.1,'sine',0.15);},d);})(fs[i],i*55); VIB.powerup(); },
  fire: function() { tone(900,0.04,'sawtooth',0.12); tone(450,0.07,'square',0.09,200); nz(0.05,0.06); VIB.fire(); if(mad>2)tone(1800,0.02,'square',0.04); },
  triple: function() { tone(600,0.06,'sine',0.14); tone(750,0.05,'sine',0.12,100); tone(900,0.04,'sine',0.1,200); VIB.powerup(); },
  bigball: function() { tone(150,0.2,'sawtooth',0.15); tone(300,0.12,'square',0.1); nz(0.08,0.1); VIB.big(); },
  freeze: function() { var fs=[800,600,400,300]; for(var i=0;i<4;i++)(function(f,d){setTimeout(function(){tone(f,0.08,'triangle',0.1);},d);})(fs[i],i*40); VIB.powerup(); },
  shield: function() { tone(400,0.05,'sine',0.12); tone(800,0.07,'sine',0.1,-100); VIB.shield(); },
  shieldBreak: function() { tone(200,0.15,'sawtooth',0.18); nz(0.1,0.14); setTimeout(function(){tone(100,0.2,'square',0.12);},60); vib([30,10,30,10,60]); },
  chaos: function() { for(var i=0;i<6;i++)(function(d){setTimeout(function(){tone(100+Math.random()*1100,0.05,'sawtooth',0.09);},d);})(i*40); nz(0.1,0.1); vib([10,5,10,5,10,5,10]); },
  reverse: function() { tone(150,0.2,'sawtooth',0.14); setTimeout(function(){tone(300,0.14,'square',0.11);},100); nz(0.07,0.07); vib([20,10,20]); },
  narrow: function() { tone(800,0.1,'sawtooth',0.12); tone(400,0.08,'square',0.09,-80); nz(0.05,0.08); vib([15,5,15]); },
  achiev: function() { var fs=[523,659,784,1047]; for(var i=0;i<4;i++)(function(f,d){setTimeout(function(){tone(f,0.14,'sine',0.16);},d);})(fs[i],i*80); vib([20,10,20,10,40]); },
  win: function() { var fs=[523,659,784,1047,1319]; for(var i=0;i<5;i++)(function(f,d){setTimeout(function(){tone(f,0.2,'sine',0.2);},d);})(fs[i],i*110); VIB.win(); }
};

// ═══ BUFFS ═══════════════════════════════════════════
var BUFFS = [
  {id:'wide',    icon:'⬛', name:'WIDE PADDLE',   desc:'Твоя платформа x1.7',          color:'#00ff41', self:true,  dur:9000},
  {id:'fire',    icon:'🔥', name:'FIREBALL',       desc:'Мяч горит и летит быстрее',   color:'#ff6600', self:true,  dur:8000},
  {id:'triple',  icon:'🎱', name:'TRIPLE BALL',    desc:'3 мяча — только ты знаешь где главный', color:'#00cfff', self:true, dur:10000},
  {id:'bigball', icon:'🔵', name:'BIG BALL',       desc:'Мяч огромный — для обоих',    color:'#cc44ff', self:true,  dur:7000},
  {id:'shield',  icon:'🛡', name:'SHIELD',         desc:'Один пропуск не считается',   color:'#aaaaff', self:true,  dur:15000},
  {id:'speedup', icon:'⚡', name:'SPEED BOOST',    desc:'Твой мяч летит быстрее',      color:'#ffee00', self:true,  dur:7000},
  {id:'narrow',  icon:'▪',  name:'SHRINK ENEMY',   desc:'Платформа врага x0.4',        color:'#ff2244', self:false, dur:8000},
  {id:'freeze',  icon:'❄',  name:'FREEZE ENEMY',   desc:'Враг движется в 4× медленнее', color:'#00cfff', self:false, dur:7000},
  {id:'reverse', icon:'🔄', name:'REVERSE',        desc:'Управление врага зеркалится', color:'#ff44ff', self:false, dur:6000},
  {id:'chaos',   icon:'💥', name:'CHAOS MODE',     desc:'Мяч хаотично прыгает',        color:'#ff0044', self:false, dur:5000}
];
function getBuff(id) { for(var i=0;i<BUFFS.length;i++) if(BUFFS[i].id===id) return BUFFS[i]; return null; }

// ═══ PALETTES ════════════════════════════════════════
var PALS=[
  {bg:'#000000',mid:'#001a06',ball:'#ffffff',p1:'#00ff41',p2:'#00ff41',tr:'255,255,255'},
  {bg:'#0a0000',mid:'#1a0500',ball:'#ff6600',p1:'#ff8800',p2:'#ff2200',tr:'255,102,0'},
  {bg:'#00000a',mid:'#00051a',ball:'#00cfff',p1:'#0088ff',p2:'#00ffee',tr:'0,207,255'},
  {bg:'#05000a',mid:'#0d0014',ball:'#cc44ff',p1:'#ff44cc',p2:'#8844ff',tr:'204,68,255'},
  {bg:'#0a0800',mid:'#1a1200',ball:'#ffee00',p1:'#ffaa00',p2:'#ffee00',tr:'255,238,0'},
  {bg:'#000a0a',mid:'#001414',ball:'#00ffcc',p1:'#00ffaa',p2:'#00ccff',tr:'0,255,204'}
];
var palIdx=0,palT=1,palFrom=PALS[0],palTo=PALS[0];
var pal={bg:'#000000',mid:'#001a06',ball:'#ffffff',p1:'#00ff41',p2:'#00ff41',tr:'255,255,255'};
var palTimer=0;
function hx(s,i){return parseInt(s.slice(i,i+2),16)||0;}
function lerpC(a,b,t){
  if(!a||!b||a.length<7||b.length<7)return a||'#000000';
  var r=Math.round(hx(a,1)+(hx(b,1)-hx(a,1))*t);
  var gv=Math.round(hx(a,3)+(hx(b,3)-hx(a,3))*t);
  var bv=Math.round(hx(a,5)+(hx(b,5)-hx(a,5))*t);
  return '#'+('0'+r.toString(16)).slice(-2)+('0'+gv.toString(16)).slice(-2)+('0'+bv.toString(16)).slice(-2);
}
function cpPal(p){return {bg:p.bg,mid:p.mid,ball:p.ball,p1:p.p1,p2:p.p2,tr:p.tr};}
function updatePal(){
  palTimer++;
  if(palTimer>540){palTimer=0;palFrom=cpPal(pal);palIdx=(palIdx+1)%PALS.length;palTo=PALS[palIdx];palT=0;}
  if(palT<1)palT=Math.min(1,palT+0.012);
  pal.bg=lerpC(palFrom.bg,palTo.bg,palT);pal.mid=lerpC(palFrom.mid,palTo.mid,palT);
  pal.ball=lerpC(palFrom.ball,palTo.ball,palT);pal.p1=lerpC(palFrom.p1,palTo.p1,palT);
  pal.p2=lerpC(palFrom.p2,palTo.p2,palT);pal.tr=palTo.tr;
}
function cyclePal(){palFrom=cpPal(pal);palIdx=(palIdx+1)%PALS.length;palTo=PALS[palIdx];palT=0;palTimer=0;}

// ═══ PARTICLES ═══════════════════════════════════════
var P=[];
function spark(x,y,color,n,spd,life){
  n=n||12;spd=spd||4;life=life||28;
  for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,s=(0.4+Math.random())*spd;P.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:life,ml:life,color:color,r:1.5+Math.random()*3,grav:0.15});}
}
function firePuff(x,y,n){
  n=n||22;var cols=['#ff4400','#ff8800','#ffee00','#ff2200','#fff'];
  for(var i=0;i<n;i++){var a=-Math.PI/2+(Math.random()-0.5)*Math.PI*0.9,s=2+Math.random()*7;P.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:16+Math.random()*18,ml:34,color:cols[i%5],r:2+Math.random()*5,grav:0.1});}
}
function icePuff(x,y){
  var cols=['#00cfff','#aaeeff','#fff','#0088ff'];

// ═══ CIRCULAR TIMER ══════════════════════════════════
function drawCircTimer(who, pct, color){
  var n=who==='p1'?'1':'2';
  var c=document.getElementById('ctc'+n);
  if(!c)return;
  var cx=c.getContext('2d');
  cx.clearRect(0,0,32,32);
  // track
  cx.beginPath();cx.arc(16,16,13,0,Math.PI*2);
  cx.strokeStyle='#111';cx.lineWidth=3;cx.stroke();
  // fill
  cx.beginPath();cx.arc(16,16,13,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);
  cx.strokeStyle=color;cx.lineWidth=3;cx.lineCap='round';cx.stroke();
  // number
  document.getElementById('ctn'+n).textContent=Math.ceil(pct*(getBuff(g&&g[who]&&g[who].buff)||{dur:1}).dur/1000)||'';
}
function updateTimers(){
  if(!g)return;
  var now=Date.now(),whos=['p1','p2'];
  for(var i=0;i<2;i++){
    var who=whos[i],p=g[who],n=who==='p1'?'1':'2';
    var ctEl=document.getElementById('ct'+n);
    if(p.buff){
      var bf=getBuff(p.buff);
      if(bf&&ctEl){
        ctEl.style.display='block';
        var pct=Math.max(0,(p.buffEnd-now)/bf.dur);
        drawCircTimer(who,pct,bf.color);
        document.getElementById('ctn'+n).textContent=Math.ceil(pct*bf.dur/1000);
      }
    } else {
      if(ctEl)ctEl.style.display='none';
    }
  }
}

function buildBlocks(round) {
  var W = cv.width, H = cv.height;
  var layout = ARK_ROUNDS[(round-1) % ARK_ROUNDS.length];
  var cols = 8, rows = layout.length;
  var margin = W * 0.04;
  var bw = (W - margin*2) / cols;
  var bh = Math.min(H * 0.055, 28);
  var topOff = H * 0.08;
  var blocks = [];
  for(var r=0;r<rows;r++){
    for(var cc2=0;cc2<cols;cc2++){
      var type = layout[r][cc2];
      if(type===0) continue;
      blocks.push({
        x: margin + cc2*bw,
        y: topOff + r*(bh+4),
        w: bw-3, h: bh,
        type: type,
        hp: type===7?2:(type===8?999:1),
        maxhp: type===7?2:(type===8?999:1),
        flash: 0
      });
    }
  }
  return blocks;
}

function startArk() {
  gameEl.style.display='none'; menuEl.style.display='none';
  wsEl.style.display='none'; poEl.style.display='none';
  survEl.style.display='none';

  document.getElementById('s2').style.visibility='hidden';

  setTimeout(function(){ tryInitArk(8); }, 100);
}

function tryInitArk(tries) {
  resizeCV();
  if((cv.width<10||cv.height<10)&&tries>0){ setTimeout(function(){tryInitArk(tries-1);},60); return; }
  if(cv.width<10) cv.width=Math.min(480,window.innerWidth);
  if(cv.height<10) cv.height=window.innerHeight-120;
  initArkRound(1, 0);
}

function initArkRound(round, score) {
  var W=cv.width, H=cv.height;
  var ballR2 = W*0.022;
  var padW = W*0.22;
  var spd2 = (5+(round-1)*0.8) * (H/700);
  var ang = -Math.PI/2 + (Math.random()-0.5)*0.6;
  ark = {
    round: round,
    score: score,
    lives: 3,
    paddle: { cx: W/2, w: padW, h: Math.max(10, H*0.022) },
    ball: { x: W/2, y: H*0.78, vx: Math.cos(ang)*spd2, vy: Math.sin(ang)*spd2, r: ballR2, launched: false },
    blocks: buildBlocks(round),
    particles: [],
    trail: [],
    combo: 0,
    comboTimer: 0,
    paused: false,
    over: false,
  };
  arkTouchX = null; arkTouchId = null;

  cancelAnimationFrame(arkAnimId);
  appState = 'game';
  arkLoop();
}

function arkLoop() {
  if(appState==='game') updateArk();
  drawArk();
  arkAnimId = requestAnimationFrame(arkLoop);
}

function updateArk() {
  if(!ark||ark.paused||ark.over) return;
  var W=cv.width, H=cv.height;
  var b=ark.ball, p=ark.paddle;

  // keyboard paddle
  var ks = (W/100)*(2+spd*0.3);
  if(keys['a']||keys['A']||keys['ArrowLeft'])  p.cx=Math.max(p.w/2, p.cx-ks);
  if(keys['d']||keys['D']||keys['ArrowRight']) p.cx=Math.min(W-p.w/2, p.cx+ks);

  if(!b.launched){ b.x=p.cx; return; }

  // trail
  ark.trail.push({x:b.x,y:b.y,life:12});
  if(ark.trail.length>18) ark.trail.shift();
  for(var ti=0;ti<ark.trail.length;ti++) ark.trail[ti].life--;

  b.x+=b.vx; b.y+=b.vy;

  // walls
  if(b.x-b.r<=0){b.x=b.r;b.vx=Math.abs(b.vx);arkSpark(b.x,b.y,'#888',4);}
  if(b.x+b.r>=W){b.x=W-b.r;b.vx=-Math.abs(b.vx);arkSpark(b.x,b.y,'#888',4);}
  if(b.y-b.r<=0){b.y=b.r;b.vy=Math.abs(b.vy);arkSpark(b.x,b.y,'#888',4);}

  // paddle hit
  var py=H-H*0.1-p.h/2;
  if(b.vy>0 && b.y+b.r>=py-p.h/2 && b.y+b.r<=py+p.h/2+Math.abs(b.vy)*2){
    if(b.x>=p.cx-p.w/2 && b.x<=p.cx+p.w/2){
      b.y=py-p.h/2-b.r;
      var rel=(b.x-p.cx)/(p.w/2);
      b.vy=-Math.abs(b.vy);
      b.vx=rel*Math.abs(b.vy)*1.4;
      // normalize speed
      var spnow=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
      var target=(5+(ark.round-1)*0.8)*(H/700);
      b.vx=b.vx/spnow*target; b.vy=b.vy/spnow*target;
      ark.combo=0;
      SFX.paddle(1);
      arkSpark(b.x,b.y,'#00ff41',8,3);
      vib([12]);
    }
  }

  // ball lost
  if(b.y>H+b.r*3){
    ark.lives--;
    vib([60,20,60]);
    flash('#ff2244',0.5); shake(10);
    SFX.score();
    if(ark.lives<=0){ arkGameOver(); return; }
    // respawn
    b.x=p.cx; b.y=H*0.78; b.vx=0; b.vy=0; b.launched=false;
    ark.combo=0;
  }

  // block hits
  var hitAny=false;
  for(var bi=0;bi<ark.blocks.length;bi++){
    var bl=ark.blocks[bi];
    if(bl.hp<=0) continue;
    // AABB vs circle
    var cx2=bl.x+bl.w/2, cy2=bl.y+bl.h/2;
    var nearX=Math.max(bl.x,Math.min(b.x,bl.x+bl.w));
    var nearY=Math.max(bl.y,Math.min(b.y,bl.y+bl.h));
    var dx=b.x-nearX, dy=b.y-nearY;
    if(dx*dx+dy*dy<b.r*b.r){
      // which side?
      var overlapX=b.r-Math.abs(dx), overlapY=b.r-Math.abs(dy);
      if(overlapX<overlapY){ b.vx=-b.vx; b.x+=dx>0?overlapX:-overlapX; }
      else{ b.vy=-b.vy; b.y+=dy>0?overlapY:-overlapY; }

      if(bl.type!==8){
        bl.hp--;
        bl.flash=8;
        var col=ARK_COLORS[bl.type]||'#fff';
        arkSpark(cx2,cy2,col,14,5,35);
        ring(cx2,cy2,col,12,16);
        flash(col,0.1);
        ark.combo++;
        ark.comboTimer=60;
        var pts=10*(ark.combo>3?2:1);
        ark.score+=pts;
        if(ark.score>arkBest){ arkBest=ark.score; try{localStorage.setItem('ark_best',arkBest);}catch(e){} }
        vib([8]);
        SFX.wall();
        if(ark.combo>=3){ showSurvPop('COMBO x'+ark.combo); flash(col,0.2); shake(3); }
      } else {
        arkSpark(cx2,cy2,'#888',6,2,15);
        vib([5]);
      }
      hitAny=true;
      break; // one block per frame
    }
  }

  // combo timer
  if(ark.comboTimer>0) ark.comboTimer--;
  else ark.combo=0;

  // remove dead blocks
  var nb=[];
  for(var bi2=0;bi2<ark.blocks.length;bi2++) if(ark.blocks[bi2].hp>0) nb.push(ark.blocks[bi2]);
  ark.blocks=nb;

  // update block flash
  for(var bi3=0;bi3<ark.blocks.length;bi3++) if(ark.blocks[bi3].flash>0) ark.blocks[bi3].flash--;

  // update particles
  var np=[];
  for(var pi=0;pi<ark.particles.length;pi++){
    var pt=ark.particles[pi];
    pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=pt.grav; pt.life--;
    if(pt.life>0) np.push(pt);
  }
  ark.particles=np;

  // round clear
  var alive2=0;
  for(var bi4=0;bi4<ark.blocks.length;bi4++) if(ark.blocks[bi4].type!==8) alive2++;
  if(alive2===0){
    // round complete!
    flash('#ffee00',0.6); shake(12);
    SFX.win(); vib([40,20,40,20,80]);
    ark.paused=true;
    setTimeout(function(){
      if(appState==='game') initArkRound(ark.round+1, ark.score);
    },1800);
  }
}

function arkSpark(x,y,color,n,spd,life){
  if(!ark) return;
  n=n||10;spd=spd||4;life=life||28;
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2,s=(0.4+Math.random())*spd;
    ark.particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:life,ml:life,color:color,r:1.5+Math.random()*3,grav:0.12});
  }
}

function drawArk(){
  if(!cv.width||!cv.height) return;
  if(!ark){ return; }
  var W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);

  // bg
  ctx.fillStyle=pal.bg; ctx.fillRect(0,0,W,H);

  // scanline-style round indicator
  ctx.font='7px "Press Start 2P",monospace';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillStyle='#007a1f';
  ctx.fillText('RND '+ark.round, 10, 8);
  ctx.textAlign='right';
  ctx.fillStyle='#00ff41';
  ctx.fillText(ark.score, W-10, 8);
  ctx.fillStyle='#007a1f';
  ctx.fillText('BEST:'+arkBest, W-10, 18);
  // lives
  ctx.textAlign='left';
  ctx.fillStyle='#ff2244';
  var liveTxt='';
  for(var li=0;li<ark.lives;li++) liveTxt+='♥ ';
  ctx.fillText(liveTxt, 10, 18);

  // center dashes
  ctx.setLineDash([5,9]); ctx.strokeStyle=pal.mid; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
  ctx.setLineDash([]);

  // blocks
  for(var bi=0;bi<ark.blocks.length;bi++){
    var bl=ark.blocks[bi];
    var col=ARK_COLORS[bl.type]||'#fff';
    var alpha=bl.type===8?0.4:1;
    if(bl.flash>0){ ctx.fillStyle='#fff'; ctx.globalAlpha=alpha; }
    else {
      // gradient fill
      var hp_pct=bl.hp/bl.maxhp;
      ctx.globalAlpha=alpha*(0.6+hp_pct*0.4);
      ctx.fillStyle=col;
    }
    ctx.shadowColor=col; ctx.shadowBlur=bl.type===8?0:8;
    ctx.fillRect(bl.x,bl.y,bl.w,bl.h);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    // hp dots for hard blocks
    if(bl.type===7&&bl.hp===1){
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.fillRect(bl.x+2,bl.y+2,bl.w-4,bl.h-4);
    }
  }

  // particles
  for(var pi=0;pi<ark.particles.length;pi++){
    var pt=ark.particles[pi],a=pt.life/pt.ml;
    ctx.globalAlpha=a; ctx.fillStyle=pt.color;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,Math.max(0.5,pt.r*(0.4+a*0.6)),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // global P array too
  drawP(ctx);

  // trail
  for(var ti=0;ti<ark.trail.length;ti++){
    var t=ark.trail[ti],tf=ti/ark.trail.length,ta=tf*0.5*(t.life/12);
    ctx.globalAlpha=ta; ctx.fillStyle='rgba(0,207,255,'+ta+')';
    ctx.beginPath(); ctx.arc(t.x,t.y,Math.max(0.5,ark.ball.r*tf*0.8),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // ball
  var b=ark.ball;
  var gr=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*4);
  gr.addColorStop(0,'rgba(0,207,255,0.6)'); gr.addColorStop(0.5,'rgba(0,207,255,0.15)'); gr.addColorStop(1,'rgba(0,207,255,0)');
  ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*4,0,Math.PI*2); ctx.fill();
  ctx.shadowColor='#00cfff'; ctx.shadowBlur=16;
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // paddle
  var p=ark.paddle, py=H-H*0.1-p.h/2;
  ctx.shadowColor=pal.p1; ctx.shadowBlur=14;
  ctx.fillStyle=pal.p1;
  ctx.fillRect(p.cx-p.w/2,py-p.h/2,p.w,p.h);
  ctx.shadowBlur=0;

  // launch hint
  if(!b.launched){
    ctx.font='6px "Press Start 2P",monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#007a1f';
    ctx.fillText('TAP TO LAUNCH',W/2,py-20);
  }

  // combo display
  if(ark.combo>=2&&ark.comboTimer>0){
    var ca=ark.comboTimer/60;
    ctx.globalAlpha=ca;
    ctx.font='9px "Press Start 2P",monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#ffee00';
    ctx.shadowColor='#ffee00'; ctx.shadowBlur=10;
    ctx.fillText('COMBO x'+ark.combo, W/2, H*0.5+30);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }

  // round clear overlay
  if(ark.paused&&!ark.over){
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
    ctx.font='14px "Press Start 2P",monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#ffee00'; ctx.shadowColor='#ffee00'; ctx.shadowBlur=20;
    ctx.fillText('ROUND CLEAR!',W/2,H/2-16);
    ctx.font='8px "Press Start 2P",monospace';
    ctx.fillStyle='#00ff41'; ctx.shadowBlur=0;
    ctx.fillText('ROUND '+(ark.round+1)+' STARTING...',W/2,H/2+16);
  }
}

// ═══ APPLY BUFF — FIXED WIDE/NARROW ══════════════════
function applyBuff(collector,buff){
  // self=true  → buff goes to collector (the one who picked it up)
  // self=false → buff goes to opponent
  var target=buff.self?collector:(collector==='p1'?'p2':'p1');
  var p=g[target];
  p.buff=buff.id;p.buffEnd=Date.now()+buff.dur;
  if(buff.id==='shield')p.shield=true;
  if(buff.id==='triple')spawnExtraBalls();
  updateBuffHUD(target);
  announceBuff(buff);
  mad=(g.p1.buff?1:0)+(g.p2.buff?1:0);
  var sfxMap={fire:SFX.fire,triple:SFX.triple,bigball:SFX.bigball,freeze:SFX.freeze,shield:SFX.shield,chaos:SFX.chaos,reverse:SFX.reverse,narrow:SFX.narrow,speedup:SFX.powerup,wide:SFX.powerup};
  (sfxMap[buff.id]||SFX.powerup)();
}

// ═══ METRICS — FIXED WIDE/NARROW ══════════════════════
function ballSpd(){var h=cv.height||600;return (7+(spd-1)*2.5)*(h/700);}
function getPHW(who){
  // wide:   the player who has the buff gets wider paddle
  // narrow: the player who has the buff gets narrower paddle (applied to opponent by applyBuff)
  var base=cv.width*0.19;
  if(!g)return base;
  var w=base;
  if(g[who].buff==='wide')w*=1.7;      // MY buff → MY paddle wider
  if(g[who].buff==='narrow')w*=0.4;    // narrow was given to ME by opponent → MY paddle narrower
  return w;
}
function getPH(){return Math.max(10,cv.height*0.022);}
function getPY(who){return who==='p1'?cv.height*0.9:cv.height*0.1;}
function getBR(){var base=cv.width*0.018;if(g&&(g.p1.buff==='bigball'||g.p2.buff==='bigball'))return base*2.8;return base;}

// ═══ MULTI-BALL ══════════════════════════════════════
function spawnExtraBalls(){
  if(!g||g.balls.length>=3)return;
  tripleExplosion(g.balls[0].x,g.balls[0].y);
  var bs=ballSpd(),main=g.balls[0];
  var angles=[-Math.PI/5,Math.PI/5];
  for(var i=0;i<2;i++){
    var spd2=Math.sqrt(main.vx*main.vx+main.vy*main.vy)||bs;
    var curA=Math.atan2(main.vy,main.vx)+angles[i];
    g.balls.push({x:main.x,y:main.y,vx:Math.cos(curA)*spd2,vy:Math.sin(curA)*spd2,spd:spd2,extra:true});
    trails.push([]);
  }
}

// ═══ UPDATE ══════════════════════════════════════════
function applyKeys(){
  if(!g||appState!=='game')return;
  var W=cv.width,s=(W/100)*(2+spd*0.3);
  var fz1=g.p2.buff==='freeze',fz2=g.p1.buff==='freeze';
  if(keys['a']||keys['A'])g.p1.cx=Math.max(getPHW('p1'),g.p1.cx-(fz1?s*0.25:s));
  if(keys['d']||keys['D'])g.p1.cx=Math.min(W-getPHW('p1'),g.p1.cx+(fz1?s*0.25:s));
  var rev=g.p2.buff==='reverse';
  var ks=fz2?s*0.25:s;
  if(keys['ArrowLeft'])g.p2.cx=Math.max(getPHW('p2'),g.p2.cx+(rev?ks:-ks));
  if(keys['ArrowRight'])g.p2.cx=Math.min(W-getPHW('p2'),g.p2.cx+(rev?-ks:ks));
}

function update(){
  if(!g)return;
  var now=Date.now(),W=cv.width,H=cv.height;
  updatePal();

  // expire buffs
  var whos=['p1','p2'];
  for(var wi=0;wi<2;wi++){
    var wp=g[whos[wi]];
    if(wp.buff&&now>wp.buffEnd){
      if(wp.buff==='shield')wp.shield=false;
      if(wp.buff==='triple'){var nb=[];for(var bi=0;bi<g.balls.length;bi++)if(!g.balls[bi].extra)nb.push(g.balls[bi]);g.balls=nb;trails=[[],[],[]];}
      wp.buff=null;updateBuffHUD(whos[wi]);mad=(g.p1.buff?1:0)+(g.p2.buff?1:0);
    }
  }
  updateTimers();

  // powerup spawn
  puTimer++;if(puTimer>300&&PU.length<3){puTimer=0;spawnPU();}

  var spdMod=(g.p1.buff==='speedup'||g.p2.buff==='speedup')?1.45:1;

  // paddle ambient effects
  if(g.p1.buff==='wide'&&Math.random()<0.2)paddleTrail(g.p1.cx,getPY('p1'),pal.p1);
  if(g.p2.buff==='wide'&&Math.random()<0.2)paddleTrail(g.p2.cx,getPY('p2'),pal.p2);
  if(g.p1.buff==='freeze'||g.p2.buff==='freeze'){if(Math.random()<0.08)icePuff(g[(g.p1.buff==='freeze'?'p2':'p1')].cx+(Math.random()-0.5)*getPHW('p2'),getPY(g.p1.buff==='freeze'?'p2':'p1'));}

  var nextBalls=[];
  for(var bi=0;bi<g.balls.length;bi++){
    var b=g.balls[bi],t=trails[bi]||[];

    // chaos
    if(g.p1.buff==='chaos'||g.p2.buff==='chaos'){
      if(Math.random()<0.04){
        b.vx+=(Math.random()-0.5)*b.spd*0.5;b.vy+=(Math.random()-0.5)*b.spd*0.3;
        var m=Math.sqrt(b.vx*b.vx+b.vy*b.vy);if(m>0){b.vx=b.vx/m*b.spd;b.vy=b.vy/m*b.spd;}
        g.chaosHits++;if(Math.random()<0.25){chaosBurst(b.x,b.y);SFX.chaos();}
      }
    }

    var bsm=spdMod*((g.p1.buff==='fire'||g.p2.buff==='fire')&&!b.extra?1.3:1);
    b.x+=b.vx*bsm;b.y+=b.vy*bsm;

    var br=getBR();
    if(b.x-br<=0){b.x=br;b.vx=Math.abs(b.vx);SFX.wall();spark(b.x,b.y,pal.ball,8,4);}
    if(b.x+br>=W){b.x=W-br;b.vx=-Math.abs(b.vx);SFX.wall();spark(b.x,b.y,pal.ball,8,4);}

    t.push({x:b.x,y:b.y,life:14});if(t.length>22)t.shift();for(var ti=0;ti<t.length;ti++)t[ti].life--;
    trails[bi]=t;

    hitPaddle(b,'p1',bi);hitPaddle(b,'p2',bi);

    // collect powerups (main ball only)
    if(bi===0){
      var nextPU=[];
      for(var pi=0;pi<PU.length;pi++){
        var pu=PU[pi];pu.life--;pu.pulse++;
        var dist=Math.sqrt((b.x-pu.x)*(b.x-pu.x)+(b.y-pu.y)*(b.y-pu.y));
        if(dist<br+22){var who2=b.vy>0?'p1':'p2';applyBuff(who2,pu.buff);spark(pu.x,pu.y,pu.buff.color,20,6,40);ring(pu.x,pu.y,pu.buff.color,20);}
        else if(pu.life>0)nextPU.push(pu);
      }
      PU=nextPU;
    }

    var alive=true;
    if(b.y<-br*6){if(b.extra){alive=false;}else{scorePoint('p1',b.x,0);return;}}
    if(b.y>H+br*6){if(b.extra){alive=false;}else{scorePoint('p2',b.x,H);return;}}
    if(alive)nextBalls.push(b);
  }
  g.balls=nextBalls;
  if(g.balls.length===0)resetBall(1);

  updateP();updateFlash();applyShake();checkAch();
}

function hitPaddle(b,who,bi){
  var p=g[who],cy=getPY(who),pw=getPHW(who),ph=getPH(),br=getBR();
  var toward=who==='p1'?b.vy>0:b.vy<0;if(!toward)return;
  var dist=who==='p1'?(b.y+br)-(cy-ph/2):(cy+ph/2)-(b.y-br);
  if(dist>0&&dist<ph+Math.abs(b.vy)*2.5){
    if(b.x>=p.cx-pw&&b.x<=p.cx+pw){
      if(who==='p1')b.y=cy-ph/2-br;else b.y=cy+ph/2+br;
      b.vy=-b.vy;
      var rel=(b.x-p.cx)/pw,oldSpd=b.spd;
      b.spd=Math.min(b.spd*1.03,ballSpd()*2.6);
      b.vx=rel*b.spd*0.9;
      var mag=Math.sqrt(b.vx*b.vx+b.vy*b.vy);if(mag>0){b.vx=b.vx/mag*b.spd;b.vy=b.vy/mag*b.spd;}
      var isFire=(g.p1.buff==='fire'||g.p2.buff==='fire')&&!b.extra;
      var isBig=g.p1.buff==='bigball'||g.p2.buff==='bigball';
      if(isBig)g.bigballHit=true;
      // survival scoring — only when P1 hits
      if(who==='p1'&&gameMode==='ai'){
        var hasActiveBuff=g.p1.buff!==null;
        survMult=hasActiveBuff?2:1;
        addSurvPoints(1);
        updateSurvUI();
      }
      if(isFire){
        firePuff(b.x,b.y,32);SFX.fire();flash('#ff4400',0.38);shake(7);
        ring(b.x,b.y,'#ff6600',18);ring(b.x,b.y,'#ffee00',9);spark(b.x,b.y,'#fff',8,6);
      } else if(isBig){
        bigballBurst(b.x,b.y);SFX.bigball();flash('#cc44ff',0.35);shake(9);
      } else {
        spark(b.x,b.y,who==='p1'?pal.p1:pal.p2,14,5);
        ring(b.x,b.y,who==='p1'?pal.p1:pal.p2,8,12);
        SFX.paddle(b.spd/Math.max(oldSpd,1));
        if(b.spd>ballSpd()*1.8){flash(pal.ball,0.2);shake(4);}
      }
    }
  }
}

function scorePoint(who,bx,by){
  var opp=who==='p1'?'p2':'p1';
  if(g[opp].shield){
    g[opp].shield=false;g[opp].buff=null;updateBuffHUD(opp);g.shieldSaved=true;
    shieldBurst(bx,by);SFX.shieldBreak();flash('#cc44ff',0.55);shake(10);
    resetBall(who==='p1'?-1:1);return;
  }
  if(g.p1.buff==='triple'||g.p2.buff==='triple')g.tripleScore=true;
  g[who].score++;
  // UPDATE SCORE DISPLAY
  if(who==='p1')s1El.textContent=g.p1.score;else s2El.textContent=g.p2.score;
  showScorePop(who,1);
  SFX.score();goalBurst(bx,by);flash('#ffffff',0.6);shake(14);cyclePal();
  if(g.lastScorer===who)g.streak++;else{g.lastScorer=who;g.streak=1;}
  if(g[opp].score-g[who].score>=4&&g[who].score>0)g.comeback=true;
  if(gameMode==='ai'){
    if(who==='p2'){
      // AI scored — game over for player
      showSurvivalOver();return;
    }
    // player scored against AI — just reset, no win condition
    resetBall(who==='p1'?-1:1);return;
  }
  if(g[who].score>=WIN_SCORE){showWin('PLAYER '+(who==='p1'?'1':'2'),g.p1.score,g.p2.score);return;}
  resetBall(who==='p1'?-1:1);
}

function resetBall(yd){
  var W=cv.width,H=cv.height,bs=ballSpd();
  var ang=Math.random()*Math.PI/4+Math.PI/8,xd=Math.random()<0.5?1:-1;
  g.balls=[{x:W/2,y:H/2,vx:Math.cos(ang)*bs*xd,vy:Math.sin(ang)*bs*yd,spd:bs,extra:false}];
  trails=[[],[],[]];
}

// ═══ DRAW ════════════════════════════════════════════
function draw(){
  if(!cv.width||!cv.height)return;
  var W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=pal.bg;ctx.fillRect(0,0,W,H);

  // center line
  ctx.setLineDash([5,9]);ctx.strokeStyle=pal.mid;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();ctx.setLineDash([]);

  if(!g)return;

  // score display on canvas — only in 2p mode
  if(gameMode!=='ai'){
    ctx.globalAlpha=0.12;
    ctx.fillStyle=pal.p2;
    ctx.font='bold 80px "Press Start 2P",monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(g.p2.score,W/2,H*0.28);
    ctx.fillStyle=pal.p1;
    ctx.fillText(g.p1.score,W/2,H*0.72);
    ctx.globalAlpha=1;
  }

  // powerups
  for(var pi=0;pi<PU.length;pi++){
    var pu=PU[pi],pa=Math.min(1,pu.life/60),sc=1+Math.sin(pu.pulse*0.12)*0.22,pr=16*sc;
    ctx.globalAlpha=pa;
    ctx.shadowColor=pu.buff.color;ctx.shadowBlur=22;
    ctx.fillStyle=pu.buff.color+'44';ctx.beginPath();ctx.arc(pu.x,pu.y,pr+10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=pu.buff.color;ctx.beginPath();ctx.arc(pu.x,pu.y,pr,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.font=Math.round(15*sc)+'px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#000';ctx.fillText(pu.buff.icon,pu.x,pu.y);
    ctx.font='5px "Press Start 2P",monospace';
    ctx.fillStyle=pu.buff.color;ctx.fillText(pu.buff.name,pu.x,pu.y+pr+12);
    ctx.globalAlpha=1;
  }

  // trails
  var isFire=g.p1.buff==='fire'||g.p2.buff==='fire';
  for(var bi=0;bi<g.balls.length;bi++){
    var tArr=trails[bi]||[];
    var tRgb=isFire&&!g.balls[bi].extra?'255,102,0':pal.tr;
    for(var ti=0;ti<tArr.length;ti++){
      var t=tArr[ti],tf=ti/tArr.length,ta=tf*0.55*(t.life/14);
      ctx.globalAlpha=ta;ctx.fillStyle='rgba('+tRgb+','+ta+')';
      var tr2=getBR()*tf*0.85;ctx.beginPath();ctx.arc(t.x,t.y,Math.max(0.5,tr2),0,Math.PI*2);ctx.fill();
    }
  }
  ctx.globalAlpha=1;

  drawP(ctx);
  drawPaddle('p1');drawPaddle('p2');
  for(var bi2=0;bi2<g.balls.length;bi2++)drawBall(g.balls[bi2]);
}

function drawPaddle(who){
  var p=g[who],cy=getPY(who),pw=getPHW(who),ph=getPH();
  var c=who==='p1'?pal.p1:pal.p2;
  var frozen=(who==='p1'&&g.p2.buff==='freeze')||(who==='p2'&&g.p1.buff==='freeze');
  var rev=p.buff==='reverse',narrow=p.buff==='narrow';
  var clr=frozen?'#00cfff':(rev?'#ff44ff':(narrow?'#ff2244':c));
  if(p.buff==='shield'){ctx.shadowColor='#cc44ff';ctx.shadowBlur=30;}
  else if(frozen){ctx.shadowColor='#00cfff';ctx.shadowBlur=20;}
  else if(p.buff==='wide'){ctx.shadowColor=c;ctx.shadowBlur=16;}
  else if(p.buff==='fire'){ctx.shadowColor='#ff6600';ctx.shadowBlur=18;}
  ctx.fillStyle=clr;ctx.fillRect(p.cx-pw,cy-ph/2,pw*2,ph);
  if(rev){ctx.fillStyle='rgba(255,68,255,0.3)';ctx.fillRect(p.cx-pw,cy-ph/2,pw*2,ph);}
  ctx.shadowBlur=0;
  // buff timer bar
  if(p.buff){
    var bf2=getBuff(p.buff);
    if(bf2){
      var pct=Math.max(0,(p.buffEnd-Date.now())/bf2.dur);
      ctx.fillStyle=bf2.color;
      var barY=who==='p1'?cy-ph/2-3:cy+ph/2+1;
      ctx.fillRect(p.cx-pw,barY,pw*2*pct,2);
    }
  }
  if(p.buff==='fire'&&Math.random()<0.5)firePuff(p.cx+(Math.random()-0.5)*pw*1.5,cy-ph/2,6);
  if(frozen&&Math.random()<0.15)icePuff(p.cx+(Math.random()-0.5)*pw,cy);
}

function drawBall(b){
  var br=getBR();
  var isFire=(g.p1.buff==='fire'||g.p2.buff==='fire')&&!b.extra;
  var isBig=g.p1.buff==='bigball'||g.p2.buff==='bigball';
  var bc=isFire?'#ff6600':(b.extra?'#00cfff':pal.ball);
  // outer glow
  var gr=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,br*5);
  gr.addColorStop(0,bc+'99');gr.addColorStop(0.5,bc+'33');gr.addColorStop(1,bc+'00');
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(b.x,b.y,br*5,0,Math.PI*2);ctx.fill();
  ctx.shadowColor=bc;ctx.shadowBlur=isFire?30:(isBig?26:14);
  ctx.fillStyle=isFire?'#ffcc00':(b.extra?'#00eeff':'#fff');
  ctx.beginPath();ctx.arc(b.x,b.y,br,0,Math.PI*2);ctx.fill();
  if(isFire){ctx.fillStyle='rgba(255,255,200,0.8)';ctx.beginPath();ctx.arc(b.x,b.y,br*0.45,0,Math.PI*2);ctx.fill();}
  if(isBig){ctx.strokeStyle='rgba(204,68,255,0.45)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(b.x,b.y,br*1.45,0,Math.PI*2);ctx.stroke();ctx.lineWidth=1;}
  ctx.shadowBlur=0;
}

// ═══ SURVIVAL SCORE ═════════════════════════════════
function initSurvival(){
  survScore=0; survMult=1;
  updateSurvUI();
  if(gameMode==='ai'){
    survEl.style.display='flex';
    // hide normal scores in AI mode
    document.getElementById('s1').style.visibility='hidden';
    document.getElementById('s2').style.visibility='hidden';
  } else {
    survEl.style.display='none';
    document.getElementById('s1').style.visibility='visible';
    document.getElementById('s2').style.visibility='visible';
  }
}
function addSurvPoints(hits){
  if(gameMode!=='ai') return;
  var pts=hits*survMult;
  survScore+=pts;
  if(survScore>survBest){
    survBest=survScore;
    try{ localStorage.setItem('pong_best', survBest); }catch(e){}
  }
  // show floating pts
  showSurvPop('+'+pts+(survMult>1?' x'+survMult:''));
  updateSurvUI();
}
function updateSurvUI(){
  if(survPtsEl) survPtsEl.textContent=survScore;
  if(survBestEl) survBestEl.textContent='BEST: '+survBest;
  if(survMultEl){
    if(survMult>1){ survMultEl.textContent='x'+survMult+' MULT!'; survMultEl.style.display='block'; }
    else { survMultEl.textContent=''; survMultEl.style.display='none'; }
  }
}
var survPopTimer=null;
function showSurvPop(txt){
  // reuse score pop
  var el=document.createElement('div');
  el.className='spop';
  el.textContent=txt;
  el.style.color='#ffee00';
  el.style.fontSize='20px';
  el.style.left='50%'; el.style.marginLeft='-30px';
  el.style.top=(cv.getBoundingClientRect().top+cv.height*0.55)+'px';
  document.getElementById('cab').appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},700);
}
// ═══ AI ═════════════════════════════════════════════
function updateAI(){
  if(!g||gameMode!=='ai') return;
  var W=cv.width;
  // AI controls p2 (top paddle)
  // p2 moves with touch in 2p mode, AI moves it here
  var b=g.balls[0]; // track main ball
  // find most threatening ball (closest to p2)
  var target=g.balls[0];
  for(var i=1;i<g.balls.length;i++){
    if(Math.abs(g.balls[i].y-getPY('p2'))<Math.abs(target.y-getPY('p2'))) target=g.balls[i];
  }

  var aiSpd=(W/100)*(2+spd*0.3);
  var pw=getPHW('p2');

  // difficulty params
  var reactionDelay, errorAmt, speedMult, predictionFactor;
  if(aiDiff==='easy'){
    reactionDelay=0.04; errorAmt=cv.width*0.12; speedMult=0.55; predictionFactor=0.2;
  } else if(aiDiff==='medium'){
    reactionDelay=0.12; errorAmt=cv.width*0.05; speedMult=0.82; predictionFactor=0.55;
  } else { // hard
    reactionDelay=0.28; errorAmt=cv.width*0.015; speedMult=1.1; predictionFactor=0.9;
  }

  // predict where ball will be when it reaches p2 y
  var predictX=target.x;
  if(target.vy<0){ // ball heading toward p2
    var timeToReach=Math.abs((target.y-getPY('p2'))/target.vy);
    predictX=target.x+target.vx*timeToReach*predictionFactor;
    // bounce off walls
    predictX=predictX%(W*2);
    if(predictX<0) predictX=-predictX;
    if(predictX>W) predictX=W*2-predictX;
  }

  // add error based on difficulty
  if(!g.aiError || Math.random()<reactionDelay){
    g.aiError=(Math.random()-0.5)*2*errorAmt;
  }
  var targetX=predictX+g.aiError;

  // move toward target
  var diff=targetX-g.p2.cx;
  var freezeMod=(g.p1.buff==='freeze')?0.25:1;
  var move=Math.min(Math.abs(diff), aiSpd*speedMult*freezeMod);
  if(Math.abs(diff)>pw*0.15){
    g.p2.cx+=diff>0?move:-move;
  }
  g.p2.cx=Math.max(pw,Math.min(W-pw,g.p2.cx));

  // apply freeze to AI
  if(g.p1.buff==='freeze') g.p2.cx=g.p2.cx; // movement already reduced above
}

// ═══ LOOP ════════════════════════════════════════════
function loop(){if(gameMode==='ark') return; applyKeys();if(appState==='game'&&gameMode==='ai')updateAI();if(appState==='game')update();draw();animId=requestAnimationFrame(loop);}

// ═══ TOUCH ═══════════════════════════════════════════
cv.addEventListener('touchstart',function(e){
  e.preventDefault();resumeAC();
  if(appState==='paused'){togglePause();return;}
  if(appState!=='game')return;
  var rect=cv.getBoundingClientRect();
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i],ty=t.clientY-rect.top,tx=t.clientX-rect.left;
    if(ty>cv.height/2){if(!touchP1)touchP1={id:t.identifier};}
    else{if(gameMode!=='ai'&&!touchP2)touchP2={id:t.identifier};}
  }
},{passive:false});
cv.addEventListener('touchmove',function(e){
  e.preventDefault();if(appState!=='game'||!g)return;
  var rect=cv.getBoundingClientRect(),W=cv.width;
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i],tx=t.clientX-rect.left;
    if(touchP1&&t.identifier===touchP1.id){var cx1=g.p1.buff==='reverse'?W-tx:tx;g.p1.cx=Math.max(getPHW('p1'),Math.min(W-getPHW('p1'),cx1));}
    if(touchP2&&t.identifier===touchP2.id){var cx2=g.p2.buff==='reverse'?W-tx:tx;g.p2.cx=Math.max(getPHW('p2'),Math.min(W-getPHW('p2'),cx2));}
  }
},{passive:false});
cv.addEventListener('touchend',function(e){
  for(var i=0;i<e.changedTouches.length;i++){var t=e.changedTouches[i];if(touchP1&&t.identifier===touchP1.id)touchP1=null;if(touchP2&&t.identifier===touchP2.id)touchP2=null;}
},{passive:false});

// ═══ KEYBOARD ════════════════════════════════════════
document.addEventListener('keydown',function(e){keys[e.key]=true;if(e.code==='Space'){togglePause();e.preventDefault();}if(e.key==='ArrowLeft'||e.key==='ArrowRight')e.preventDefault();});
document.addEventListener('keyup',function(e){keys[e.key]=false;});

showMenu();
</script>
